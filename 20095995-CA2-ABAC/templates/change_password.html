{% extends "base.html" %}
{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <div class="card">
        <h2 style="margin-top: 0; color: var(--primary);">Secure Your Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">For security purposes, please change your system generated temporary password to a custom password.</p>
        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Password & Access Portal</button>
        </form>
    </div>
</div>
{% endblock %}
